name: Daily MLB Sharp Cards

# Runs every day at 12:00 PM America/New_York.
# Cron is in UTC. We schedule both 16:00 UTC (covers EDT, March-Nov)
# and 17:00 UTC (covers EST, Nov-March). The script idempotently writes
# today's slate, so if both fire one will be a no-op overwrite.
on:
  schedule:
    - cron: "0 16 * * *"   # 12:00 PM ET during EDT
    - cron: "0 17 * * *"   # 12:00 PM ET during EST
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write           # so we can commit the daily output back

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      ODDS_API_KEY:           ${{ secrets.ODDS_API_KEY }}
      SLACK_WEBHOOK_URL:      ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
      EMAIL_SMTP_HOST:        ${{ secrets.EMAIL_SMTP_HOST }}
      EMAIL_SMTP_PORT:        ${{ secrets.EMAIL_SMTP_PORT }}
      EMAIL_SMTP_USER:        ${{ secrets.EMAIL_SMTP_USER }}
      EMAIL_SMTP_PASS:        ${{ secrets.EMAIL_SMTP_PASS }}
      EMAIL_TO:               ${{ secrets.EMAIL_TO }}
      TZ:                     America/New_York

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine target date (US/Eastern)
        id: date
        run: echo "value=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Settle yesterday's pending bets
        run: python bet_tracker.py settle --data-root ./mlb_data
        continue-on-error: true

      - name: Scrape MLB data
        run: python mlb_data_scraper.py --date ${{ steps.date.outputs.value }} --out ./mlb_data

      - name: Grade games and build cards
        run: python mlb_grader.py --date ${{ steps.date.outputs.value }} --data-root ./mlb_data

      - name: Append today's cards to bet log
        run: python bet_tracker.py append --date ${{ steps.date.outputs.value }} --data-root ./mlb_data

      - name: Rebuild record.md
        run: python bet_tracker.py report --data-root ./mlb_data

      - name: Rebuild bankroll simulation
        run: python bankroll_sim.py --data-root ./mlb_data
        continue-on-error: true   # sim is non-critical

      - name: Build HTML dashboard
        run: python build_dashboard.py --date ${{ steps.date.outputs.value }} --data-root ./mlb_data
        continue-on-error: true   # dashboard is nice-to-have

      - name: Send cards to configured destinations
        run: python notify.py --date ${{ steps.date.outputs.value }} --data-root ./mlb_data
        continue-on-error: true   # don't fail the workflow if a webhook is down

      - name: Commit daily artifacts back to repo
        run: |
          git config user.name  "mlb-sharp-bot"
          git config user.email "mlb-sharp-bot@users.noreply.github.com"
          git add mlb_data/${{ steps.date.outputs.value }}/ \
                  mlb_data/bet_log.csv mlb_data/record.md mlb_data/bankroll_sim.md \
                  mlb_data/dashboard.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily cards + record ${{ steps.date.outputs.value }}"
            git push
          fi

      - name: Upload cards.md as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-cards-${{ steps.date.outputs.value }}
          path: mlb_data/${{ steps.date.outputs.value }}/
          if-no-files-found: warn
